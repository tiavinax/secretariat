<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head"></head>
<body>
<canvas id="particle-canvas"></canvas>
<div class="app-shell">
  <aside class="sidebar" id="sidebar" th:replace="fragments/header :: sidebar"></aside>
  <header class="topbar" th:replace="fragments/header :: topbar"></header>
  <main class="main-content">

    <div class="page-header">
      <div>
        <h2>Ajouter un Paiement</h2>
        <p>Enregistrer un nouveau paiement d'écolage</p>
      </div>
    </div>

    <!-- Message succès -->
    <div th:if="${success}" style="background:#d4edda;color:#155724;padding:12px 16px;border-radius:8px;margin-bottom:16px;">
      <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
    </div>

    <!-- Message erreur -->
    <div th:if="${error}" style="background:#f8d7da;color:#721c24;padding:12px 16px;border-radius:8px;margin-bottom:16px;">
      <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
    </div>

    <div class="grid-2">

      <!-- Formulaire paiement -->
      <div class="card">
        <div class="card-header"><h3>Nouveau paiement</h3></div>
        <div class="card-body">
          <form th:action="@{/secretariat/paiement}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <!-- Sélection élève -->
            <div class="form-group">
              <label>Élève</label>
              <select class="form-control" name="inscriptionId" id="inscriptionSelect"
                      onchange="chargerEcheances(this.value)" required>
                <option value="">— Sélectionner un élève —</option>
                <option th:each="insc : ${inscriptions}"
                        th:value="${insc.id}"
                        th:text="${insc.etudiant.nom + ' ' + insc.etudiant.prenom + ' — ' + insc.classe.nom}">
                </option>
              </select>
            </div>

            <!-- Sélection échéance -->
            <div class="form-group">
              <label>Échéance</label>
              <select class="form-control" name="echeanceId" id="echeanceSelect" required>
                <option value="">— Sélectionner d'abord un élève —</option>
              </select>
            </div>

            <!-- Montant -->
            <div class="form-group">
              <label>Montant (Ar)</label>
              <input type="number" class="form-control" name="montant"
                     id="montantInput" placeholder="80 000" min="0" required/>
            </div>

            <!-- Mode de paiement -->
            <div class="form-group">
              <label>Mode de paiement</label>
              <select class="form-control" name="modePaiement" required>
                <option value="especes">Espèces</option>
                <option value="virement">Virement</option>
                <option value="mvola">MVola</option>
                <option value="orange_money">Orange Money</option>
                <option value="cheque">Chèque</option>
              </select>
            </div>

            <!-- Notes -->
            <div class="form-group">
              <label>Notes (optionnel)</label>
              <input type="text" class="form-control" name="notes" placeholder="Remarques…"/>
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%;">
              <i class="fas fa-save"></i> Enregistrer le paiement
            </button>
          </form>
        </div>
      </div>

      <!-- Panneau info échéance sélectionnée -->
      <div class="card">
        <div class="card-header"><h3>Détail de l'échéance</h3></div>
        <div class="card-body" id="echeanceDetail">
          <p style="color:var(--txt3);text-align:center;margin-top:2rem;">
            Sélectionnez un élève pour voir ses échéances.
          </p>
        </div>
      </div>

    </div>
  </main>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>

<script>
function chargerEcheances(inscriptionId) {
    if (!inscriptionId) return;

    fetch('/secretariat/paiement/echeances?inscriptionId=' + inscriptionId, {
        headers: { 'Accept': 'application/json' }
    })
    .then(r => r.json())
    .then(echeances => {
        const select = document.getElementById('echeanceSelect');
        const detail = document.getElementById('echeanceDetail');
        const montantInput = document.getElementById('montantInput');

        select.innerHTML = '<option value="">— Sélectionner une échéance —</option>';

        if (echeances.length === 0) {
            select.innerHTML = '<option value="">Aucune échéance ouverte</option>';
            detail.innerHTML = '<p style="color:green;text-align:center;margin-top:2rem;"><i class="fas fa-check-circle"></i> Toutes les échéances sont soldées.</p>';
            return;
        }

        echeances.forEach(e => {
            const opt = document.createElement('option');
            opt.value = e.id;
            opt.text = 'Tranche ' + e.numeroTranche + ' — ' + e.montantAttendu.toLocaleString() + ' Ar (limite : ' + e.dateLimite + ')';
            select.appendChild(opt);
        });

        // Afficher le détail de la première échéance
        afficherDetail(echeances[0], montantInput);

        select.addEventListener('change', function() {
            const selected = echeances.find(e => e.id == this.value);
            if (selected) afficherDetail(selected, montantInput);
        });
    })
    .catch(err => console.error('Erreur chargement échéances:', err));
}

function afficherDetail(echeance, montantInput) {
    const detail = document.getElementById('echeanceDetail');
    montantInput.value = echeance.montantAttendu;
    montantInput.max   = echeance.montantAttendu;

    detail.innerHTML = `
        <div style="display:flex;flex-direction:column;gap:12px;margin-top:1rem;">
            <div style="display:flex;justify-content:space-between;">
                <span style="color:var(--txt3);">Tranche</span>
                <strong>${echeance.numeroTranche}</strong>
            </div>
            <div style="display:flex;justify-content:space-between;">
                <span style="color:var(--txt3);">Montant attendu</span>
                <strong>${echeance.montantAttendu.toLocaleString()} Ar</strong>
            </div>
            <div style="display:flex;justify-content:space-between;">
                <span style="color:var(--txt3);">Date limite</span>
                <strong>${echeance.dateLimite}</strong>
            </div>
            <div style="display:flex;justify-content:space-between;">
                <span style="color:var(--txt3);">Statut</span>
                <strong style="color:${echeance.estSoldee ? 'green' : 'orange'};">
                    ${echeance.estSoldee ? '✅ Soldée' : '⏳ En attente'}
                </strong>
            </div>
        </div>
    `;
}
</script>
</body>
</html>
