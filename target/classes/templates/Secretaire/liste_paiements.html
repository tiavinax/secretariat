<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body>
<canvas id="particle-canvas"></canvas>
<div class="app-shell">
  <aside class="sidebar" id="sidebar" th:replace="~{fragments/header :: sidebar}"></aside>
  <header class="topbar" th:replace="~{fragments/header :: topbar}"></header>
  <main class="main-content">

    <div class="page-header">
      <div>
        <h2>Liste des Paiements</h2>
        <p>Recherche et consultation des paiements enregistrés</p>
      </div>
    </div>

    <!-- Formulaire recherche -->
    <div class="card" style="margin-bottom:1.5rem;">
      <div class="card-header"><h3><i class="fas fa-search"></i> Recherche</h3></div>
      <div class="card-body">
        <form th:action="@{/secretariat/paiements}" method="get">
          <div class="form-row" style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;">
            <div class="form-group">
              <label>Nom de l'élève</label>
              <input type="text" class="form-control" name="nom"
                     th:value="${nom}" placeholder="Rakoto…"/>
            </div>
            <div class="form-group">
              <label>Classe</label>
              <input type="text" class="form-control" name="classe"
                     th:value="${classe}" placeholder="Terminale A…"/>
            </div>
            <div class="form-group">
              <label>Mode de paiement</label>
              <select class="form-control" name="modePaiement">
                <option value="">— Tous —</option>
                <option value="especes"      th:selected="${modePaiement == 'especes'}">Espèces</option>
                <option value="virement"     th:selected="${modePaiement == 'virement'}">Virement</option>
                <option value="mvola"        th:selected="${modePaiement == 'mvola'}">MVola</option>
                <option value="orange_money" th:selected="${modePaiement == 'orange_money'}">Orange Money</option>
                <option value="cheque"       th:selected="${modePaiement == 'cheque'}">Chèque</option>
              </select>
            </div>
            <div class="form-group">
              <label>Date début</label>
              <input type="date" class="form-control" name="dateDebut"
                     th:value="${dateDebut}"/>
            </div>
            <div class="form-group">
              <label>Date fin</label>
              <input type="date" class="form-control" name="dateFin"
                     th:value="${dateFin}"/>
            </div>
            <div class="form-group" style="display:flex;align-items:flex-end;gap:8px;">
              <button type="submit" class="btn btn-primary" style="flex:1;">
                <i class="fas fa-search"></i> Rechercher
              </button>
              <a th:href="@{/secretariat/paiements}" class="btn" style="flex:1;text-align:center;">
                <i class="fas fa-times"></i> Réinitialiser
              </a>
            </div>
          </div>
        </form>
      </div>
    </div>

    <!-- Résultats -->
    <div class="card">
      <div class="card-header">
        <h3>Résultats
          <span style="font-size:13px;font-weight:400;color:var(--txt3);"
                th:text="'(' + ${paiements.size()} + ' paiement(s))'"></span>
        </h3>
      </div>
      <div class="card-body" style="padding:0;">
        <table style="width:100%;border-collapse:collapse;font-size:13px;">
          <thead>
            <tr style="background:var(--surface2);">
              <th style="padding:10px 16px;text-align:left;">Élève</th>
              <th style="padding:10px 16px;text-align:left;">Classe</th>
              <th style="padding:10px 16px;text-align:center;">Tranche</th>
              <th style="padding:10px 16px;text-align:right;">Montant (Ar)</th>
              <th style="padding:10px 16px;text-align:center;">Date</th>
              <th style="padding:10px 16px;text-align:center;">Mode</th>
              <th style="padding:10px 16px;text-align:center;">Statut</th>
              <th style="padding:10px 16px;text-align:center;">Facture</th>
            </tr>
          </thead>
          <tbody>
            <tr th:if="${paiements.isEmpty()}">
              <td colspan="8" style="padding:24px;text-align:center;color:var(--txt3);">
                Aucun paiement trouvé.
              </td>
            </tr>
            <tr th:each="p, stat : ${paiements}"
                th:style="${stat.odd ? 'background:var(--surface2)' : ''}">
              <td style="padding:10px 16px;font-weight:500;"
                  th:text="${p.inscription.etudiant.nom + ' ' + p.inscription.etudiant.prenom}"></td>
              <td style="padding:10px 16px;"
                  th:text="${p.inscription.classe.nom}"></td>
              <td style="padding:10px 16px;text-align:center;"
                  th:text="'Tranche ' + ${p.echeance.numeroTranche}"></td>
              <td style="padding:10px 16px;text-align:right;font-weight:600;"
                  th:text="${#numbers.formatDecimal(p.montant, 0, 'COMMA', 0, 'POINT')}"></td>
              <td style="padding:10px 16px;text-align:center;"
                  th:text="${#temporals.format(p.datePaiement, 'dd/MM/yyyy')}"></td>
              <td style="padding:10px 16px;text-align:center;text-transform:uppercase;font-size:11px;"
                  th:text="${p.modePaiement}"></td>
              <td style="padding:10px 16px;text-align:center;">
                <span th:if="${p.echeance.estSoldee}"
                      style="color:var(--teal);font-weight:600;">✔ Soldée</span>
                <span th:unless="${p.echeance.estSoldee}"
                      style="color:orange;font-weight:600;">⏳ Partiel</span>
              </td>
              <td style="padding:10px 16px;text-align:center;">
                <a th:href="@{/secretariat/paiements/{id}/pdf(id=${p.id})}"
                   style="color:var(--teal);font-size:18px;" title="Télécharger facture PDF">
                  <i class="fas fa-file-pdf"></i>
                </a>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
