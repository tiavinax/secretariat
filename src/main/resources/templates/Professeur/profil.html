<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body>
<canvas id="particle-canvas"></canvas>
<div class="app-shell">
  <aside class="sidebar" id="sidebar" th:replace="~{fragments/header :: sidebar}"></aside>
  <header class="topbar" th:replace="~{fragments/header :: topbar}"></header>
  <main class="main-content">
    <div class="page-header"><div><h2>Mon Profil</h2><p>Informations personnelles et professionnelles</p></div></div>
      <div class="grid-2">
        <div class="card">
          <div class="card-body" style="text-align:center;padding:var(--sp-2xl);">
            <div class="prof-card-avatar" style="background:linear-gradient(135deg,var(--g),var(--b));width:100px;height:100px;font-size:36px;margin:0 auto var(--sp-lg);">RB</div>
            <h3 style="font-family:var(--font-display);font-size:22px;">Prof. Rabe Hery</h3>
            <div style="color:var(--g);font-weight:600;font-size:13px;margin-top:6px;text-transform:uppercase;letter-spacing:.5px;">Mathématiques</div>
            <div style="margin-top:var(--sp-lg);font-family:var(--font-mono);font-size:22px;color:var(--txt);">320 000 <span style="font-size:13px;font-family:var(--font-body);color:var(--txt3);">Ar/mois</span></div>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><h3>Mes informations</h3></div>
          <div class="card-body">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-md);">
              <div><div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);margin-bottom:4px;">Quartier</div><strong>Analakely</strong></div>
              <div><div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);margin-bottom:4px;">Contact</div><strong>034 12 345 67</strong></div>
              <div><div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);margin-bottom:4px;">Date d'embauche</div><strong>15 Sept. 2020</strong></div>
              <div><div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);margin-bottom:4px;">Titulaire de</div><strong>Terminale C</strong></div>
              <div style="grid-column:span 2;"><div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);margin-bottom:4px;">Matières enseignées</div><div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;"><span class="badge badge-amber">Mathématiques</span><span class="badge badge-violet">Statistiques</span></div></div>
            </div>
          </div>
        </div>
      </div>
  </main>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
