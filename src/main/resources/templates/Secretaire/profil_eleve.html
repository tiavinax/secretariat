<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body>
<canvas id="particle-canvas"></canvas>
<div class="app-shell">
  <aside class="sidebar" id="sidebar" th:replace="~{fragments/header :: sidebar}"></aside>
  <header class="topbar" th:replace="~{fragments/header :: topbar}"></header>
  <main class="main-content">

    <div class="page-header">
      <div>
        <h2>Profil de l'Élève</h2>
        <p><a th:href="@{/secretariat/eleves}" style="cursor:pointer;color:var(--g);">← Retour à la liste</a></p>
      </div>
      <div style="display:flex;gap:var(--sp-sm);">
        <a th:href="@{/secretariat/profil/{id}/export/pdf(id=${eleve.id})}"
           class="btn btn-secondary"><i class="fas fa-file-pdf"></i> PDF</a>
        <a th:href="@{/secretariat/profil/{id}/export/csv(id=${eleve.id})}"
           class="btn btn-secondary"><i class="fas fa-file-csv"></i> CSV</a>
        <button class="btn btn-outline" onclick="openModal('modal-demande-modification')">
          <i class="fas fa-edit"></i> Demande modification
        </button>
      </div>
    </div>

    <div class="grid-2">
      <!-- Carte identité -->
      <div class="card">
        <div class="card-body" style="text-align:center;padding:var(--sp-2xl);">
          <!-- Photo ou initiales -->
          <div th:if="${eleve.photoUrl == null}"
               class="avatar-placeholder"
               style="width:90px;height:90px;background:linear-gradient(135deg,var(--ink),var(--b));font-size:32px;margin:0 auto var(--sp-lg);display:flex;align-items:center;justify-content:center;border-radius:50%;color:white;font-weight:bold;"
               th:text="${eleve.initiales}"></div>
          <img th:if="${eleve.photoUrl != null}"
               th:src="${eleve.photoUrl}"
               style="width:90px;height:90px;border-radius:50%;object-fit:cover;margin:0 auto var(--sp-lg);display:block;"
               alt="photo"/>
          <h3 style="font-family:var(--font-display);font-size:22px;"
              th:text="${eleve.prenom + ' ' + eleve.nom}"></h3>
          <div style="margin-top:var(--sp-sm);">
            <span class="badge badge-navy" th:text="${eleve.nomClasse}"></span>
          </div>
          <div style="margin-top:var(--sp-lg);font-family:var(--font-mono);font-size:12px;color:var(--txt3);"
               th:text="${'ID-' + eleve.id + ' · ' + eleve.matricule}"></div>
        </div>
      </div>

      <!-- Informations personnelles -->
      <div class="card">
        <div class="card-header"><h3>Informations personnelles</h3></div>
        <div class="card-body">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-md);">
            <div>
              <div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);margin-bottom:4px;">Date de naissance</div>
              <strong th:text="${eleve.dateNaissance != null} ? ${#temporals.format(eleve.dateNaissance, 'dd MMMM yyyy', #locale)} : '—'"></strong>
            </div>
            <div>
              <div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);margin-bottom:4px;">Quartier</div>
              <strong th:text="${eleve.commune ?: '—'}"></strong>
            </div>
            <div>
              <div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);margin-bottom:4px;">Adresse</div>
              <strong th:text="${eleve.adresse ?: '—'}"></strong>
            </div>
            <div>
              <div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);margin-bottom:4px;">Date d'inscription</div>
              <strong th:text="${eleve.dateInscription != null} ? ${#temporals.format(eleve.dateInscription, 'dd MMM yyyy', #locale)} : '—'"></strong>
            </div>
            <div>
              <div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);margin-bottom:4px;">Nom du parent</div>
              <strong th:text="${eleve.nomParent != null} ? ${eleve.prenomParent + ' ' + eleve.nomParent} : '—'"></strong>
            </div>
            <div>
              <div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);margin-bottom:4px;">Contact parent</div>
              <strong th:text="${eleve.telephoneParent ?: '—'}"></strong>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Historique de paiement -->
    <div class="card" style="margin-top:var(--sp-xl);">
      <div class="card-header"><h3>Historique de paiement</h3></div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr><th>Mois</th><th>Date de paiement</th><th>Montant</th><th>Statut</th></tr>
          </thead>
          <tbody>
            <tr th:each="p : ${eleve.historiquesPaiements}">
              <td th:text="${p.moisLabel}"></td>
              <td th:text="${p.datePaiement != null} ? ${#temporals.format(p.datePaiement, 'dd/MM/yyyy')} : '—'"></td>
              <td th:text="${#numbers.formatDecimal(p.montant, 0, 'COMMA', 0, 'POINT') + ' Ar'}"></td>
              <td>
                <span th:if="${p.paye}" class="badge badge-green">Payé</span>
                <span th:unless="${p.paye}" class="badge badge-red">Non payé</span>
              </td>
            </tr>
            <tr th:if="${#lists.isEmpty(eleve.historiquesPaiements)}">
              <td colspan="4" style="text-align:center;color:var(--txt3);padding:var(--sp-lg);">
                Aucun paiement enregistré.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<!-- Modal demande de modification dossier -->
<div class="modal-backdrop" id="modal-demande-modification">
  <div class="modal">
    <div class="modal-header">
      <h3>Demande de modification du dossier</h3>
      <button onclick="closeModal('modal-demande-modification')" style="color:var(--txt3);font-size:18px;">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <form th:action="@{/secretariat/profil/{id}/demande-modification(id=${eleve.id})}" method="post">
      <div class="modal-body">
        <div class="form-group">
          <label>Champ à modifier</label>
          <select name="champModifie" class="form-control">
            <option value="adresse">Adresse</option>
            <option value="commune">Quartier</option>
            <option value="telephone">Téléphone</option>
            <option value="nom">Nom</option>
            <option value="prenom">Prénom</option>
            <option value="date_naissance">Date de naissance</option>
          </select>
        </div>
        <div class="form-group">
          <label>Ancienne valeur</label>
          <input type="text" name="ancienneValeur" class="form-control" placeholder="Valeur actuelle"/>
        </div>
        <div class="form-group">
          <label>Nouvelle valeur</label>
          <input type="text" name="nouvelleValeur" class="form-control" placeholder="Nouvelle valeur souhaitée"/>
        </div>
        <div class="form-group">
          <label>Motif</label>
          <textarea name="motif" class="form-control" rows="3" placeholder="Raison de la modification…"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="closeModal('modal-demande-modification')">Annuler</button>
        <button type="submit" class="btn btn-primary">Soumettre la demande</button>
      </div>
    </form>
  </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
